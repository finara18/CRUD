<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .section {
            display: none;
        }

        .active {
            display: block;
        }
    </style>

</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->

            <div class="col-2 bg-dark text-white vh-100">

                <h4 class="p-3">Dashboard</h4>

                <ul class="nav flex-column">

                    <li class="nav-item">
                        <button class="btn btn-dark w-100" onclick="showSection('home')">Inicio</button>
                    </li>

                    <li class="nav-item">
                        <button class="btn btn-dark w-100" onclick="showSection('users')">Usuarios</button>
                    </li>

                    <li class="nav-item">
                        <button class="btn btn-dark w-100" onclick="showSection('settings')">Configuración</button>
                    </li>

                </ul>

            </div>

            <!-- CONTENIDO -->

            <div class="col-10 p-4">

                <div id="home" class="section active">
                    <h2>Inicio</h2>
                    <p>Bienvenido al dashboard</p>
                </div>

                <div id="users" class="section">
                    <h2>Usuarios</h2>
                    <p>Aquí va la tabla del CRUD</p>
                </div>

                <div id="settings" class="section">
                    <h2>Configuración</h2>
                    <p>Ajustes del sistema</p>
                </div>

            </div>

        </div>
    </div>

    <script>

        function showSection(id) {

            document.querySelectorAll(".section").forEach(section => {
                section.classList.remove("active");
            });

            document.getElementById(id).classList.add("active");

        }

    </script>

</body>

</html>
