<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Finara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>


    <!--Card-->

    <div class="login_card">
        <img src="logo.png" width="90px" height="70px" class="logo">
        <h1 class="title-login">Finara</h1>
        <h3 class="welcome-text">Bienvenido al login de finara</h3>

        <!--Email-->
        <h2 class="email-text"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-envelope" viewBox="0 0 16 16">
                <path
                    d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z" />
            </svg> correo electronico</h2>
        <input type="email" id="logEmail" placeholder="Correo" class="input_email">

        <!--Password-->
        <div class="div-password">
            <h2 class="password-text"><i class="bi bi-lock"></i>contraseña</h2>
            <h2 class="forgot-password">¿Olvidaste tu contraseña?</h2>
        </div>

        <div class="input-password">
            <input type="password" id="logPass" placeholder="Password">
            <i class="bi bi-eye" id="togglePassword"></i>
        </div>

        <label class="label_remeber">
            <input type="checkbox" class="input_remember">Recordar sesion
        </label>
        <button onclick="login()" class="button_signIn">Iniciar sesión<i class="bi bi-box-arrow-in-right"></i></button>
        
        <h2 class="question1">¿No tienes cuenta?</h2>

        <div>
        <a class="singup-link" href="singup.html">Registrarme</a>
        </div>
    </div>
    
    
    
    
    <script type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

</body>

</html>
