<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CRUD Firebase</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>
    <!--Navbar-->
    <div class="col-2 bg-ligth text-white vh-100 navbar">
        <div class="navbar_title d-flex align-items-center gap-2 p-3">
            <img src="logo.png" alt="logo" class="logo" width="40">
            <h5 class="title_text">Finara</h5>
        </div>

        <ul class="nav flex-column">

            <li class="nav-item">
                <button class="btn btn-ligth w-100 btnDashboard" onclick="showSection('home')">Dashboard</button>
            </li>
            <li class="nav-item">
                <button class="btn btn-ligth w-100 btnUser" onclick="showSection('users')">Usuarios</button>
            </li>
            <li class="nav-item">
                <button class="btn btn-ligth w-100 btnProjects" onclick="showSection('projects')">Proyectos</button>
            </li>
            <li class="nav-item">
                <button class="btn btn-ligth w-100 btnSettings" onclick="showSection('settings')">Configuración</button>
            </li>
        </ul>

        <div class="profile">
            <div class="profile_info">
                <p class="profile_name">Nombre</p>
                <p class="profile_role">Rol</p>
            </div>

            <a href="index.html" class="log_out">Cerrar sesión</a>
        </div>
    </div>


    <div class="col-10 p-4">

        <div id="home" class="section active">
            <h2>Inicio</h2>
            <p>Bienvenido al dashboard</p>
        </div>


        <div id="users" class="section">
            <div class="content_dashboard">
                <h2>Gestión de usuarios</h2>
                <p>Administra tus usuarios</p>

                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalUsuario">
                    Agregar usuario
                </button>

                <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Nuevo usuario</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body">
                                <input class="form-control mb-2" type="text" id="nombreUsuario" placeholder="Nombre">
                                <input class="form-control mb-2" type="text" id="edadUsuario" placeholder="Edad">
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                                <button type="button" class="btn btn-primary" onclick="guardar()">Guardar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <h3>Datos</h3>
                <ul id="lista"></ul>
            </div>
        </div>


        <div id="settings" class="section">
            <h2>Configuración</h2>
            <p>Ajustes del sistema</p>
        </div>

    </div>



    <script>
        function showSection(sectionId) {

            const sections = document.querySelectorAll('.section');
            sections.forEach(section => {
                section.classList.remove('active');
            });

            const targetSection = document.getElementById(sectionId);
            if (targetSection) {
                targetSection.classList.add('active');
            }
        }

        window.showSection = showSection;
    </script>












    <script type="module" src="crud.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
