<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CRUD Firebase</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>
    <div class="dashboard_container">
        <div class="navbar">
            <div class="navbar_title">
                <img src="logo.png" alt="logo" class="logo">
                <h1 class="title-navbar">Finara</h1>
            </div>
            <h2><i class="bi bi-people-fill"></i>Usuarios</h2>
            <h2><i class="bi bi-people-fill"></i>Admins</h2>
            <h2><i class="bi bi-people-fill"></i>Reportes</h2>
            <h2><i class="bi bi-people-fill"></i>Configuraciones</h2>

            <div>
                <h1>Kevin</h1>
                <h2>admin</h2>
                <h2>cerrar sesion</h2>
            </div>
        </div>

        <div class="content_dashboard">
            <h2>Gestion de usuarios</h2>
            <h2>Administra tus usuarios</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                Agregar usuario
            </button>
            <!-- Modal -->
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <input type="text" id="nombre" placeholder="Nombre">
                            <input type="text" id="edad" placeholder="Edad">

                            <button onclick="guardar()">Guardar</button>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" onclick="guardar()">Save changes</button>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <input type="text" id="nombre" placeholder="Buscar por nombre">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>NOMBRE / AVATAR</th>
                            <th>ROL</th>
                            <th>NIVEL</th>
                            <th>PROYECTOS</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="user-info">
                                    <img src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                                    <div>
                                        <div class="name">Juan Martínez</div>
                                        <div class="email">juan.mtz@renov.com</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="role">Albañil Principal</span></td>
                            <td><span class="badge-level">N3</span></td>
                            <td><span class="projects-count">12</span></td>
                            <td><span class="status active">ACTIVO</span></td>
                            <td class="actions">
                                <button class="btn-icon">✏️</button>
                                <button class="btn-icon">👁️</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>



            <h3>Datos</h3>
            <ul id="lista"></ul>
        </div>
    </div>

    <script type="module" src="crud.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
